<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full_Frkn_Proper - Enterprise AI Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #1a0033 100%);
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 200px;
            background: rgba(0, 0, 0, 0.5);
            border-right: 1px solid #a855f7;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #a855f7;
        }

        .logo-small {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #d946ef);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .app-title {
            font-size: 12px;
            font-weight: bold;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 15px;
            color: #4ade80;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .model-count {
            font-size: 11px;
            color: #a855f7;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 4px;
            border-left: 2px solid #a855f7;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a855f7, #d946ef);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(168, 85, 247, 0.4);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 20, 0.8);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 20px;
        }

        .logo-large {
            width: 300px;
            height: 300px;
            opacity: 0.15;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .empty-state h2 {
            font-size: 24px;
            color: #a855f7;
            font-weight: 600;
        }

        .empty-state p {
            color: #888;
            font-size: 14px;
            max-width: 400px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #a855f7, #d946ef);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid #a855f7;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .model-label {
            font-size: 11px;
            color: #a855f7;
            font-weight: bold;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a855f7;
            font-size: 14px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #a855f7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #a855f7;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid #a855f7;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        #messageInput:focus {
            background: rgba(168, 85, 247, 0.2);
            border-color: #d946ef;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        #messageInput::placeholder {
            color: #888;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-upload {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
            border: 1px solid #a855f7;
        }

        .btn-upload:hover {
            background: rgba(168, 85, 247, 0.3);
            transform: translateY(-2px);
        }

        .btn-send {
            background: linear-gradient(135deg, #a855f7, #d946ef);
            color: white;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(168, 85, 247, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #fileInput {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(168, 85, 247, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #d946ef;
        }

        .model-response {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-section">
                <div class="logo-small">☠️</div>
                <div class="app-title">Full_Frkn_Proper</div>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span>Connected</span>
            </div>
            <div class="model-count" id="modelCount">420+ AI Models Ready</div>
            <button class="new-chat-btn" onclick="newChat()">+ NEW CHAT</button>
            <div class="chat-history"></div>
        </div>

        <div class="main-content">
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div style="font-size: 120px; opacity: 0.2;">☠️</div>
                    <h2>Start a conversation with Full_Frkn_Proper</h2>
                    <p>Upload files or type a message to begin</p>
                </div>
            </div>

            <div class="input-area">
                <input type="file" id="fileInput" onchange="handleFileUpload(event)">
                <div class="input-group">
                    <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">📎 UPLOAD</button>
                    <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn btn-send" id="sendBtn" onclick="sendMessage()">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_ENDPOINTS = {
            'Claude Opus 4.8': 'https://api.anthropic.com/v1/messages',
            'GPT-5.5': 'https://api.openai.com/v1/chat/completions',
            'Gemini 3.1': 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent',
            'Mistral Large': 'https://api.mistral.ai/v1/chat/completions',
            'Llama 3.1': 'https://api.together.xyz/v1/chat/completions',
            'Cohere': 'https://api.cohere.ai/v1/chat',
            'Perplexity': 'https://api.perplexity.ai/chat/completions',
            'Grok': 'https://api.x.ai/v1/chat/completions'
        };

        let messages = [];

        function newChat() {
            messages = [];
            document.getElementById('messagesContainer').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 120px; opacity: 0.2;">☠️</div>
                    <h2>Start a conversation with Full_Frkn_Proper</h2>
                    <p>Upload files or type a message to begin</p>
                </div>
            `;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            const loadingId = 'loading-' + Date.now();
            addMessage('<div class="loading"><div class="spinner"></div>Getting responses from all models...</div>', 'ai', loadingId);

            try {
                // For now, show a demo response since we don't have API keys
                removeMessage(loadingId);
                
                const demoResponses = {
                    'Claude Opus 4.8': 'I\'m Claude Opus 4.8, Anthropic\'s most capable model. I can help with complex reasoning, analysis, and creative tasks.',
                    'GPT-5.5': 'Hello! I\'m GPT-5.5 from OpenAI. I can assist with a wide range of tasks including writing, coding, and analysis.',
                    'Gemini 3.1': 'I\'m Gemini 3.1 from Google. I excel at understanding context and providing comprehensive responses.',
                    'Mistral Large': 'Greetings! I\'m Mistral Large. I\'m optimized for complex tasks and can handle large context windows.',
                    'Llama 3.1': 'I\'m Llama 3.1 from Meta. I\'m an open-source model trained to be helpful and harmless.',
                    'Cohere': 'Hello! I\'m Cohere\'s Command model. I\'m designed for enterprise applications and semantic search.',
                    'Perplexity': 'I\'m Perplexity AI. I specialize in providing accurate, sourced information with real-time web search.',
                    'Grok': 'I\'m Grok from xAI. I have a unique perspective and can engage with complex topics.'
                };

                for (const [model, response] of Object.entries(demoResponses)) {
                    addMessage(response, 'ai', `model-${model}`);
                }

            } catch (error) {
                console.error('Error:', error);
                removeMessage(loadingId);
                addMessage(`<div class="error-message">⚠️ Error: ${error.message || 'Failed to get response'}</div>`, 'ai');
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            addMessage(`📎 Analyzing: ${file.name}`, 'user');
            
            const loadingId = 'loading-' + Date.now();
            addMessage('<div class="loading"><div class="spinner"></div>Processing file with all AI models...</div>', 'ai', loadingId);

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    removeMessage(loadingId);
                    
                    const demoAnalysis = {
                        'Claude Opus 4.8': `I've analyzed "${file.name}" (${(file.size / 1024).toFixed(2)} KB). This appears to be a ${file.type || 'file'} that I can process and provide detailed insights on.`,
                        'GPT-5.5': `File "${file.name}" received. I can provide analysis and insights based on its content and type.`,
                        'Gemini 3.1': `Analyzing "${file.name}"... I can extract key information and provide comprehensive analysis.`,
                        'Mistral Large': `Processing "${file.name}"... Ready to provide detailed analysis and insights.`,
                        'Llama 3.1': `File received: "${file.name}". I can help analyze and understand its contents.`,
                        'Cohere': `"${file.name}" has been processed. I can provide semantic analysis and key insights.`,
                        'Perplexity': `Analyzing "${file.name}"... I can provide sourced insights and relevant information.`,
                        'Grok': `"${file.name}" analyzed. I can offer unique perspectives on its content.`
                    };

                    for (const [model, analysis] of Object.entries(demoAnalysis)) {
                        addMessage(analysis, 'ai', `model-${model}`);
                    }
                };
                reader.readAsArrayBuffer(file);
            } catch (error) {
                console.error('File processing error:', error);
                removeMessage(loadingId);
                addMessage(`<div class="error-message">⚠️ Error processing file: ${error.message}</div>`, 'ai');
            }

            event.target.value = '';
        }

        function addMessage(content, role, id = null) {
            const container = document.getElementById('messagesContainer');
            
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            if (id) messageDiv.id = id;

            if (role === 'ai' && !content.includes('loading') && !content.includes('error')) {
                // Extract model name from id
                const modelName = id ? id.replace('model-', '') : 'AI';
                messageDiv.innerHTML = `
                    <div class="message-content">
                        <div class="model-label">${modelName}</div>
                        ${content}
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            }

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function removeMessage(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Full_Frkn_Proper initialized');
        });
    </script>
</body>
</html>
